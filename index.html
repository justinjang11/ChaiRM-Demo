    function startChatFieldEdit(el) {
      const chatId    = el.dataset.chatId;
      const chatField = el.dataset.chatField;
      const chat = appData.getCoffeeChat(chatId);
      if (!chat) return;

      if (chatField === 'date') {
        const existing = chat.dateTime ? new Date(chat.dateTime) : new Date();
        // Format as YYYY-MM-DD for the date input
        const pad = n => String(n).padStart(2, '0');
        const dateVal = `${existing.getFullYear()}-${pad(existing.getMonth()+1)}-${pad(existing.getDate())}`;

        const input = document.createElement('input');
        input.type      = 'date';
        input.className = 'inline-edit-input';
        input.value     = dateVal;
        input.style.minWidth = '120px';
        el.replaceWith(input);
        input.focus();

        const save = () => {
          if (input.value) {
            const [y, m, d] = input.value.split('-').map(Number);
            const dt = chat.dateTime ? new Date(chat.dateTime) : new Date();
            dt.setFullYear(y, m - 1, d);
            appData.updateCoffeeChat(chatId, { dateTime: dt.toISOString() });
          }
          renderContacts();
        };
        input.addEventListener('blur', save);
        input.addEventListener('keydown', e => {
          if (e.key === 'Enter')  { e.preventDefault(); input.blur(); }
          if (e.key === 'Escape') { renderContacts(); }
        });
        return;
      }

      if (chatField === 'status') {
        const opts = [
          { value: 'upcoming',  label: 'Upcoming'   },
          { value: 'completed', label: 'Completed'  },
          { value: 'due',       label: 'Due'        },
          { value: 'sent',      label: 'Sent'       },
        ];
        let current = 'upcoming';
        if      (chat.thankYouStatus === 'due')  current = 'due';
        else if (chat.thankYouStatus === 'sent') current = 'sent';
        else if (chat.status === 'completed')    current = 'completed';

        const select = document.createElement('select');
        select.className = 'inline-edit-select';
        opts.forEach(opt => {
          const o = document.createElement('option');
          o.value = opt.value; o.textContent = opt.label;
          if (opt.value === current) o.selected = true;
          select.appendChild(o);
        });
        el.replaceWith(select);
        select.focus();

        const save = () => {
          const val = select.value;
          if      (val === 'upcoming')  appData.updateCoffeeChat(chatId, { status: 'upcoming',  thankYouStatus: null });
          else if (val === 'completed') appData.updateCoffeeChat(chatId, { status: 'completed', thankYouStatus: null });
          else if (val === 'due')       appData.updateCoffeeChat(chatId, { status: 'completed', thankYouStatus: 'due' });
          else if (val === 'sent') {
            appData.updateCoffeeChat(chatId, { status: 'completed', thankYouStatus: 'sent' });
            const contact = appData.getContact(chat.contactId);
            if (contact && contact.relationshipStatus === 'new')
              appData.updateContact(contact.id, { relationshipStatus: 'active' });
          }
          updateThankYouBadge();
          renderContacts();
        };
        select.addEventListener('change', save);
        select.addEventListener('blur',   save);
        return;
      }
    }

    function startContactFieldEdit(el) {
      const contactId = el.dataset.contactId;
      const field     = el.dataset.field;
      const contact   = appData.getContact(contactId);
      if (!contact) return;
      const currentValue = contact[field] || '';

      if (field === 'relationshipStatus') {
        const opts   = ['new', 'active'];
        const select = document.createElement('select');
        select.className = 'inline-edit-select';
        opts.forEach(opt => {
          const o = document.createElement('option');
          o.value = opt; o.textContent = opt;
          if (opt === currentValue) o.selected = true;
          select.appendChild(o);
        });
        el.replaceWith(select);
        select.focus();
        const save = () => {
          appData.updateContact(contactId, { relationshipStatus: select.value });
          renderContacts();
        };
        select.addEventListener('change', save);
        select.addEventListener('blur',   save);
        return;
      }

      // Text fields
      const input = document.createElement('input');
      input.type      = 'text';
      input.className = 'inline-edit-input';
      input.value     = currentValue;
      el.replaceWith(input);
      input.focus();
      input.select();

      const save = () => {
        const newVal = input.value.trim();
        if (newVal) appData.updateContact(contactId, { [field]: newVal });
        renderContacts();
      };
      input.addEventListener('blur', save);
      input.addEventListener('keydown', e => {
        if (e.key === 'Enter')  { e.preventDefault(); input.blur(); }
        if (e.key === 'Escape') { renderContacts(); }
      });
    }

    function renderContacts() {
      const container = document.getElementById('page-content');
      document.getElementById('page-title').textContent = 'Contacts';
      document.getElementById('page-subtitle').textContent = 'Your network, beautifully managed.';
      document.getElementById('header-actions').innerHTML = `
        <button class="btn btn-secondary btn-sm" onclick="exportContactsCSV()" title="Download contacts as CSV">↓ Contacts</button>
        <button class="btn btn-secondary btn-sm" onclick="exportChatsCSV()" title="Download all chats as CSV">↓ Chats</button>
        <button class="btn btn-primary" onclick="navigate('new-chat')">New Chat</button>
      `;

      const filterTabs = ['all', 'due', 'followup', 'upcoming'];
      const tabLabels = ['All', 'Thank-you due', 'Follow-up due', 'Upcoming'];

      let html = '<div class="filter-pills" id="contact-filters">';
      filterTabs.forEach((tab, idx) => {
        const activeClass = tab === 'all' ? 'active' : '';
        html += `<button class="filter-pill ${activeClass}" data-filter="${tab}">${tabLabels[idx]}</button>`;
      });
      html += '</div><div id="contacts-table-container"></div>';

      container.innerHTML = html;

      const pills = document.querySelectorAll('.filter-pill');
      pills.forEach(pill => {
        pill.addEventListener('click', (e) => {
          pills.forEach(p => p.classList.remove('active'));
          e.target.classList.add('active');
          renderContactsTable(e.target.dataset.filter);
        });
      });

      renderContactsTable('all');
    }

    function renderContactsTable(filter) {
      window._contactsFilter = filter || 'all'; // track for post-delete re-render
      const tableContainer = document.getElementById('contacts-table-container');
      let contacts = appData.data.contacts;

      if (filter === 'due') {
        const chatIds = appData.data.coffeeChats.filter(c => c.thankYouStatus === 'due').map(c => c.contactId);
        contacts = contacts.filter(c => chatIds.includes(c.id));
      } else if (filter === 'followup') {
        // End of today — anything with a followUpDate on or before now is overdue
        const endOfToday = new Date();
        endOfToday.setHours(23, 59, 59, 999);
        const debriefIds = appData.data.debriefs.filter(d => {
          if (d.nextStep !== 'follow_up') return false;
          // No date set → treat as overdue (old data migration path)
          if (!d.followUpDate) return true;
          return new Date(d.followUpDate) <= endOfToday;
        }).map(d => d.coffeeChatId);
        const chatIds = appData.data.coffeeChats.filter(c => debriefIds.includes(c.id)).map(c => c.contactId);
        contacts = contacts.filter(c => chatIds.includes(c.id));
      } else if (filter === 'upcoming') {
        const chatIds = appData.data.coffeeChats.filter(c => c.status === 'upcoming').map(c => c.contactId);
        contacts = contacts.filter(c => chatIds.includes(c.id));
      }

      if (contacts.length === 0) {
        tableContainer.innerHTML = '<p style="color: var(--text-muted); text-align: center; padding: 2rem;">No connections yet. Add your first coffee chat to get started.</p>';
        return;
      }

      let html = '<div class="table-container"><table><thead><tr><th>Person</th><th>Firm & Role</th><th>Chat Date</th><th>Thank-You</th><th>Relationship</th><th>Notes</th><th></th></tr></thead><tbody>';

      contacts.forEach(contact => {
        const chats = appData.getCoffeeChatsByContact(contact.id);
        // Pick the chat with the most recent dateTime, not just the last-inserted one
        const latestChat = chats.length > 0
          ? chats.slice().sort((a, b) => new Date(b.dateTime) - new Date(a.dateTime))[0]
          : null;
        const debrief = latestChat ? appData.getDebriefByCoffeeChat(latestChat.id) : null;

        let statusBadge = '';
        let thankYouButton = '';
        if (latestChat) {
          const cid = latestChat.id;
          const editAttrs = `data-chat-id="${cid}" data-chat-field="status" onclick="startChatFieldEdit(this)" title="Click to edit"`;
          if (latestChat.thankYouStatus === 'due') {
            statusBadge    = `<span class="badge badge-due editable-cell" ${editAttrs}>Due</span>`;
            thankYouButton = `<button class="btn btn-sm btn-secondary" onclick="markThankYouSent('${cid}')">Mark Sent</button>`;
          } else if (latestChat.thankYouStatus === 'sent') {
            statusBadge = `<span class="badge badge-sent editable-cell" ${editAttrs}>Sent</span>`;
          } else if (latestChat.status === 'upcoming') {
            statusBadge = `<span class="badge badge-upcoming editable-cell" ${editAttrs}>Upcoming</span>`;
          } else if (latestChat.status === 'completed') {
            statusBadge = `<span class="badge badge-completed editable-cell" ${editAttrs}>Completed</span>`;
          }
        }

        const relationshipBadge = `<span class="badge badge-relationship badge-${contact.relationshipStatus} editable-cell" data-contact-id="${contact.id}" data-field="relationshipStatus" onclick="startContactFieldEdit(this)" title="Click to edit">${contact.relationshipStatus === 'active' ? '● ' : ''}${contact.relationshipStatus}</span>`;

        const debreifButton = latestChat && latestChat.status === 'completed' && !debrief ? `<button class="btn btn-sm btn-secondary" onclick="navigate('debrief?chatId=${latestChat.id}')">Debrief</button>` : '';

        // Escape name for safe inline onclick attribute
        const safeName = contact.name.replace(/\\/g, '\\\\').replace(/'/g, "\\'");
        const deleteButton = `<button class="btn btn-sm btn-secondary" style="color:var(--danger);border-color:rgba(200,157,152,0.5);" onclick="confirmDeleteContact('${contact.id}','${safeName}')">Delete</button>`;

        html += `
          <tr>
            <td>
              <div class="contact-person">
                <div class="avatar-link ${latestChat ? 'has-chat' : ''}" ${latestChat ? `onclick="navigate('debrief?chatId=${latestChat.id}')"` : ''} title="${latestChat ? 'View debrief' : 'No chat logged yet'}">${createAvatar(contact.name).outerHTML}</div>
                <div class="contact-person-info">
                  <div class="name editable-cell" data-contact-id="${contact.id}" data-field="name" onclick="startContactFieldEdit(this)" title="Click to edit">${contact.name}${contact.isExample ? '<span class="example-tag">Example</span>' : ''}</div>
                  <div class="context editable-cell" data-contact-id="${contact.id}" data-field="context" onclick="startContactFieldEdit(this)" title="Click to edit">${contact.context}</div>
                </div>
              </div>
            </td>
            <td>
              <div class="contact-firm-role">
                <div class="firm editable-cell" data-contact-id="${contact.id}" data-field="firm" onclick="startContactFieldEdit(this)" title="Click to edit">${contact.firm}</div>
                <div class="role editable-cell" data-contact-id="${contact.id}" data-field="role" onclick="startContactFieldEdit(this)" title="Click to edit">${contact.role}</div>
              </div>
            </td>
            <td>${latestChat
              ? `<span class="editable-cell" style="font-size:0.875rem;color:var(--text-mid);" data-chat-id="${latestChat.id}" data-chat-field="date" onclick="startChatFieldEdit(this)" title="Click to edit">${formatDate(latestChat.dateTime)}</span>`
              : '<span style="color:var(--text-muted);">—</span>'}</td>
            <td>${statusBadge || '<span style="color:var(--text-muted);">—</span>'}</td>
            <td>${relationshipBadge}</td>
            <td><span class="editable-cell" style="font-size:0.82rem;color:${contact.notes ? 'var(--text-mid)' : 'var(--text-muted)'};" data-contact-id="${contact.id}" data-field="notes" onclick="startContactFieldEdit(this)" title="Click to add notes">${contact.notes || '+ add note'}</span>${debrief ? '<span style="display:block;font-size:0.6rem;color:var(--text-muted);letter-spacing:0.06em;text-transform:uppercase;margin-top:3px;">✓ debriefed</span>' : ''}</td>
            <td>
              <div class="contact-action-group">
                ${debreifButton}
                ${thankYouButton}
                ${deleteButton}
              </div>
            </td>
          </tr>
        `;
      });

      html += '</tbody></table></div>';
      tableContainer.innerHTML = html;
    }

    function markThankYouSent(chatId) {
      const chat = appData.getCoffeeChat(chatId);
      const contact = appData.getContact(chat.contactId);

      appData.updateCoffeeChat(chatId, {
        thankYouStatus: 'sent'
      });

      const newStatus = contact.relationshipStatus === 'new' ? 'active' : contact.relationshipStatus;
      appData.updateContact(contact.id, {
        relationshipStatus: newStatus
      });

      updateThankYouBadge();
      // Re-render whichever page is currently active instead of forcing Contacts
      handleRoute();
      showToast('Follow-up recorded. ✓', 'success');
    }

    // Shared helper — returns the humanized availability string (or null if empty)
    function getAvailabilityText() {
      const availability = appData.getAvailability();
      const dayNames = ['Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday', 'Sunday'];

      const grouped = {};
      for (let day = 0; day < 7; day++) {
        const blocks = availability.filter(a => a.dayOfWeek === day);
        if (blocks.length > 0) grouped[day] = blocks;
      }

      const activeDays = Object.keys(grouped).map(Number);
      if (activeDays.length === 0) return null;

      const sentences = activeDays.map(day => {
        const slotPhrases = grouped[day].map(b => `${formatHHMM(b.startTime)} to ${formatHHMM(b.endTime)}`);
        const slotsStr = slotPhrases.length === 1
          ? slotPhrases[0]
          : slotPhrases.length === 2
            ? slotPhrases[0] + ' and ' + slotPhrases[1]
            : slotPhrases.slice(0, -1).join(', ') + ', and ' + slotPhrases[slotPhrases.length - 1];
        return `${dayNames[day]} from ${slotsStr}`;
      });

      const dayList = sentences.length === 1
        ? sentences[0]
        : sentences.length === 2
          ? sentences[0] + ', and ' + sentences[1]
          : sentences.slice(0, -1).join(', ') + ', and ' + sentences[sentences.length - 1];

      return `This next week, I'm available ${dayList}. Happy to find a time that works for you. Just let me know!`;
    }

      const text = getAvailabilityText();
      document.getElementById('availability-text').textContent = text || 'No availability set yet.';

    // Curated top-3 suggested slots
    const PINNED_SLOTS = [
      { label: '10:00 AM – 12:00 PM (2 hrs)',  value: '10:00|12:00' },
      { label: '12:00 PM – 2:00 PM (2 hrs)',   value: '12:00|14:00' },
      { label: '2:00 PM – 4:00 PM (2 hrs)',    value: '14:00|16:00' },
    ];

    // All qualifying slots: 10am–5pm, 30-min increments, min 2 hrs — minus the pinned ones
    function buildAllSlots() {
      const pinnedValues = new Set(PINNED_SLOTS.map(s => s.value));
      const slots = [];
      const fmt = (m) => {
        const h = Math.floor(m / 60), min = m % 60;
        const ampm = h >= 12 ? 'PM' : 'AM';
        return `${h % 12 || 12}:${String(min).padStart(2,'0')} ${ampm}`;
      };
      const pad = (m) => `${String(Math.floor(m/60)).padStart(2,'0')}:${String(m%60).padStart(2,'0')}`;
      for (let s = 10*60; s <= 17*60 - 120; s += 30) {
        for (let e = s + 120; e <= 17*60; e += 30) {
          const val = `${pad(s)}|${pad(e)}`;
          if (pinnedValues.has(val)) continue;
          const durMins = e - s;
          const durH = Math.floor(durMins / 60), durM = durMins % 60;
          const durLabel = durH + (durM ? '.5' : '') + ' hr' + (durMins > 60 ? 's' : '');
          slots.push({ label: `${fmt(s)} – ${fmt(e)} (${durLabel})`, value: val });
        }
      }
      return slots;
    }

    // ==================== ICS IMPORT ====================

    function triggerICSImport() {
      const input = document.getElementById('ics-file-input');

    async function handleICSFile(event) {
      const file = event.target.files[0];
      if (!file) return;
      event.target.value = ''; // reset so same file can be re-picked

      const isZip = file.name.toLowerCase().endsWith('.zip') || file.type === 'application/zip' || file.type === 'application/x-zip-compressed';

      let icsTexts = [];
      if (isZip) {
        showToast('Reading zip file…', 'success');
        try {
          icsTexts = await extractICSFromZip(file);
        } catch (err) {
          showToast('Could not read zip file: ' + err.message, 'error');
          return;
        }
        if (icsTexts.length === 0) {
          showToast('No .ics files found inside the zip. Try a different export.', 'error');
          return;
        }
      } else {
        // Plain .ics / .ical text
        const text = await file.text();
        icsTexts = [text];
      }

      const allInstances = [];
      for (const text of icsTexts) {
        allInstances.push(...parseICS(text));
      }

      const freeSlots = computeFreeSlots(allInstances);

      if (freeSlots.length === 0) {
        showToast('No free windows found in the next 7 days (10 AM–5 PM, 2+ hrs). Your calendar looks packed!', 'error');
      } else {
        showICSPreviewModal(freeSlots);
      }
    }

    // Pure-JS ZIP parser — no external libraries needed.
    // Supports stored (method 0) and deflate (method 8) via DecompressionStream.
    async function extractICSFromZip(file) {
      const buf = await file.arrayBuffer();
      const bytes = new Uint8Array(buf);
      const results = [];
      const dec = new TextDecoder();
      const readU16 = (o) => bytes[o] | (bytes[o+1] << 8);
      const readU32 = (o) => bytes[o] | (bytes[o+1] << 8) | (bytes[o+2] << 16) | (bytes[o+3] << 24);

      let i = 0;
      while (i < bytes.length - 4) {
        // Local file header: PK\x03\x04
        if (bytes[i] !== 0x50 || bytes[i+1] !== 0x4B || bytes[i+2] !== 0x03 || bytes[i+3] !== 0x04) { i++; continue; }

        const method       = readU16(i + 8);
        let compSize       = readU32(i + 18);
        const fileNameLen  = readU16(i + 26);
        const extraLen     = readU16(i + 28);
        const fileName     = dec.decode(bytes.slice(i + 30, i + 30 + fileNameLen));
        const dataStart    = i + 30 + fileNameLen + extraLen;

        // Guard: if compSize is 0 and it's a data-descriptor entry, scan for next PK header
        // (common in macOS-generated zips)
        let dataEnd = dataStart + compSize;
        if (compSize === 0) {
          // Try to find the next local header or central directory header
          let scan = dataStart;
          while (scan < bytes.length - 4) {
            if (bytes[scan] === 0x50 && bytes[scan+1] === 0x4B &&
               (bytes[scan+2] === 0x03 || bytes[scan+2] === 0x01)) { break; }
            scan++;
          }
          dataEnd = scan;
          compSize = dataEnd - dataStart;
        }

        const isICS = fileName.toLowerCase().endsWith('.ics') || fileName.toLowerCase().endsWith('.ical');
        if (isICS && compSize > 0) {
          const compressed = bytes.slice(dataStart, dataEnd);
          if (method === 0) {
            // Stored — raw bytes
            results.push(dec.decode(compressed));
          } else if (method === 8) {
            // Deflated — use browser-native DecompressionStream
            try {
              const ds = new DecompressionStream('deflate-raw');
              const writer = ds.writable.getWriter();
              writer.write(compressed);
              writer.close();
              const chunks = [];
              const reader = ds.readable.getReader();
              while (true) {
                const { done, value } = await reader.read();
                if (done) break;
                chunks.push(value);
              }
              const out = new Uint8Array(chunks.reduce((n, c) => n + c.length, 0));
              let off = 0; for (const c of chunks) { out.set(c, off); off += c.length; }
              results.push(dec.decode(out));
            } catch (e) { console.warn('Deflate failed for', fileName, e); }
          }
        }

        i = dataEnd;
      }
      return results;
    }

    // parseICS returns raw BUSY instances — each event that exists in the calendar
    // for the next 7 days. Shape: { date (Date), startMins (int), endMins (int) }
    // computeFreeSlots() then inverts these into free windows.
    function parseICS(content) {
      const instances = [];

      const now = new Date();
      const todayStart = new Date(now.getFullYear(), now.getMonth(), now.getDate());
      const windowEnd  = new Date(todayStart.getTime() + 7 * 24 * 60 * 60 * 1000);

      const toMins = (timeStr) => {
        const [h, m] = timeStr.split(':').map(Number);
        return h * 60 + m;
      };

      const dateForDow = (dow) => {
        // Find the next date in the 7-day window whose day-of-week matches
        for (let d = 0; d < 7; d++) {
          const date = new Date(todayStart.getTime() + d * 24 * 60 * 60 * 1000);
          if (date.getDay() === dow) return date;
        }
        return null;
      };

      const unfolded = content.replace(/\r\n[ \t]/g, '').replace(/\n[ \t]/g, '');
      const blocks = unfolded.split(/BEGIN:VEVENT/i);

      for (let i = 1; i < blocks.length; i++) {
        const block = blocks[i];
        const dtstartRaw = extractICSProp(block, 'DTSTART');
        const dtendRaw   = extractICSProp(block, 'DTEND');
        const rruleRaw   = extractICSProp(block, 'RRULE');

        if (!dtstartRaw || !dtendRaw) continue;

        const start = parseICSDateTime(dtstartRaw);
        const end   = parseICSDateTime(dtendRaw);
        if (!start || !end || start.time === end.time) continue;

        const startMins = toMins(start.time);
        const endMins   = toMins(end.time);

        if (rruleRaw) {
          const freq  = rruleParam(rruleRaw, 'FREQ');
          const byday = rruleParam(rruleRaw, 'BYDAY');
          const until = rruleParam(rruleRaw, 'UNTIL');

          if (until) {
            const u = parseICSDateTime(until);
            if (u && u.date < todayStart) continue;
          }

          if (freq === 'DAILY') {
            // Fires every day — add one instance per day in window
            for (let d = 0; d < 7; d++) {
              instances.push({ date: new Date(todayStart.getTime() + d * 24 * 60 * 60 * 1000), startMins, endMins });
            }
          } else if (freq === 'WEEKLY') {
            const targetDOWs = (byday ? parseBYDAY(byday) : [start.dow]);
            for (let d = 0; d < 7; d++) {
              const date = new Date(todayStart.getTime() + d * 24 * 60 * 60 * 1000);
              if (targetDOWs.includes(date.getDay())) {
                instances.push({ date, startMins, endMins });
              }
            }
          } else {
            // MONTHLY/YEARLY — only if that specific start date is in the window
            if (start.date >= todayStart && start.date < windowEnd) {
              instances.push({ date: start.date, startMins, endMins });
            }
          }
        } else {
          // One-time event: only if within the window
          if (start.date >= todayStart && start.date < windowEnd) {
            instances.push({ date: start.date, startMins, endMins });
          }
        }
      }
      return instances;
    }

    // Given busy instances from parseICS, compute FREE windows per day:
    // gaps within 10 AM–5 PM that are ≥ 2 hours, returned as { dow, startTime, endTime }
    function computeFreeSlots(instances) {
      const WINDOW_START = 10 * 60; // 600 mins = 10:00 AM
      const WINDOW_END   = 17 * 60; // 1020 mins = 5:00 PM
      const MIN_GAP      = 120;     // 2 hours

      const pad = (m) => `${String(Math.floor(m / 60)).padStart(2,'0')}:${String(m % 60).padStart(2,'0')}`;

      const now = new Date();
      const todayStart = new Date(now.getFullYear(), now.getMonth(), now.getDate());

      const freeSlots = [];

      for (let d = 0; d < 7; d++) {
        const date    = new Date(todayStart.getTime() + d * 24 * 60 * 60 * 1000);
        const dateKey = date.toDateString();
        const dow     = date.getDay();

        // Collect busy intervals for this day, clipped to the window
        const busy = instances
          .filter(ev => ev.date.toDateString() === dateKey)
          .map(ev => ({
            s: Math.max(ev.startMins, WINDOW_START),
            e: Math.min(ev.endMins,   WINDOW_END),
          }))
          .filter(ev => ev.s < ev.e) // only intervals that actually overlap the window
          .sort((a, b) => a.s - b.s);

        // Merge overlapping/adjacent busy intervals
        const merged = [];
        for (const interval of busy) {
          if (merged.length && interval.s <= merged[merged.length - 1].e) {
            merged[merged.length - 1].e = Math.max(merged[merged.length - 1].e, interval.e);
          } else {
            merged.push({ ...interval });
          }
        }

        // Find gaps between merged busy intervals (and at edges of window)
        let cursor = WINDOW_START;
        for (const busy of merged) {
          if (busy.s > cursor) {
            const gapEnd = busy.s;
            if (gapEnd - cursor >= MIN_GAP) {
              freeSlots.push({ dow, startTime: pad(cursor), endTime: pad(gapEnd) });
            }
          }
          cursor = Math.max(cursor, busy.e);
        }
        // Gap after last busy block
        if (WINDOW_END - cursor >= MIN_GAP) {
          freeSlots.push({ dow, startTime: pad(cursor), endTime: pad(WINDOW_END) });
        }
      }

      return freeSlots;
    }

    function extractICSProp(block, key) {
      // Matches PROPERTY:value and PROPERTY;PARAM=X:value
      const re = new RegExp(`^${key}[;:][^\r\n]*`, 'mi');
      const m = block.match(re);
      if (!m) return null;
      const colon = m[0].indexOf(':');
      return colon !== -1 ? m[0].slice(colon + 1).trim() : null;
    }

    function parseICSDateTime(raw) {
      // Strip any TZID prefix artefacts, grab the date+time digits
      const digits = raw.replace(/[^0-9T]/gi, '');
      const hasTime = digits.includes('T');
      const datePart = hasTime ? digits.split('T')[0] : digits;
      const timePart = hasTime ? digits.split('T')[1] : '000000';

      if (datePart.length < 8) return null;

      const yr  = parseInt(datePart.substr(0, 4));
      const mo  = parseInt(datePart.substr(4, 2)) - 1;
      const dy  = parseInt(datePart.substr(6, 2));
      const hr  = parseInt(timePart.substr(0, 2) || '0');
      const mn  = parseInt(timePart.substr(2, 2) || '0');

      let date;
      if (raw.trim().endsWith('Z')) {
        // UTC — convert to local wall-clock time for display
        date = new Date(Date.UTC(yr, mo, dy, hr, mn));
      } else {
        date = new Date(yr, mo, dy, hr, mn);
      }

      const dow  = date.getDay(); // 0 Sun … 6 Sat
      const lhr  = date.getHours();
      const lmn  = date.getMinutes();
      return {
        dow,
        date, // full Date object for window filtering
        time: `${String(lhr).padStart(2,'0')}:${String(lmn).padStart(2,'0')}`
      };
    }

    function rruleParam(rrule, param) {
      const m = rrule.match(new RegExp(`${param}=([^;\\r\\n]+)`, 'i'));
      return m ? m[1].toUpperCase() : null;
    }

    function parseBYDAY(byday) {
      const map = { SU:0, MO:1, TU:2, WE:3, TH:4, FR:5, SA:6 };
      return byday.split(',')
        .map(d => map[d.replace(/[^A-Z]/gi,'').toUpperCase()])
        .filter(d => d !== undefined);
    }

        const durH = Math.floor(durMins / 60), durM = durMins % 60;

          </div>`;
      }).join('');

      const html = `

          <div class="modal" style="max-width:520px;">

              <span style="background:var(--primary-light);color:var(--primary-dark);font-size:0.75rem;font-weight:600;padding:2px 8px;border-radius:var(--radius-pill);margin-left:4px;">${windowLabel}</span><br>

    function confirmICSImport(events) {
      const checkboxes = document.querySelectorAll('[id^="ics-ev-"]:not(:disabled)');
      let added = 0;
      checkboxes.forEach((cb, idx) => {

        // Convert JS getDay() (0=Sun…6=Sat) → app dayOfWeek (0=Mon…6=Sun)
        const appDow = (e.dow + 6) % 7;
        appData.addAvailability({ dayOfWeek: appDow, startTime: e.startTime, endTime: e.endTime });
        added++;
      });
      document.getElementById('ics-modal').remove();
      renderAvailability();
      showToast(`✓ ${added} availability block${added !== 1 ? 's' : ''} imported!`, 'success');
    }

          window._draftAutosaveTimer = setTimeout(() => {
            const body = _draftOut.value;
            const type  = document.querySelector('.draft-type-btn.btn-primary')?.dataset.type || 'request';
            const rName = document.getElementById('r-name')?.value.trim() || '';
            appData.setDraftState({ body, contextKey: `${type}:${rName}`, savedAt: new Date().toISOString() });
            const _s2 = document.getElementById('draft-autosave-status');
            if (_s2) {
              _s2.textContent = 'Saved';
              setTimeout(() => {
                const fresh = appData.getDraftState();
                const _s3 = document.getElementById('draft-autosave-status');
                if (_s3 && fresh.savedAt) _s3.textContent = `Saved · ${formatRelativeTime(fresh.savedAt)}`;
              }, 1800);
            }
          }, 600);
        });
      }
    }

    // Parses comma-separated context clues into natural prose
    function integrateContext(raw, tone) {
      if (!raw.trim()) return '';
      const items = raw.split(',').map(s => s.trim()).filter(Boolean);
      if (!items.length) return '';
      const cap = s => s.charAt(0).toUpperCase() + s.slice(1);

      const process = (item) => {
        // "met at / saw at / connected at / found on / came across on"
        if (/^(met|saw|spoke(?: with)?|talked(?: with)?|connected(?: with)?|found|came across)(?: you)?(?: at| through| via| on| in) /i.test(item)) {
          const place = item.replace(/^(met|saw|spoke(?: with)?|talked(?: with)?|connected(?: with)?|found|came across)(?: you)?(?: at| through| via| on| in) /i, '');
          return tone === 'chaotic' ? `I loved meeting you at ${place}`
               : tone === 'warm'   ? `I enjoyed meeting you at ${place}`
               :                     `We had the chance to connect at ${place}`;
        }
        // "referred by X" / "introduced by X"
        if (/^(?:referred|introduced)(?: to you)?(?: by| through) /i.test(item)) {
          const person = item.replace(/^(?:referred|introduced)(?: to you)?(?: by| through) /i, '');
          return `${cap(person)} suggested I reach out`;
        }
        // "both love/liked/enjoyed X" or "bonded over X" or "share interest in X"
        if (/^(?:both\s+)?(?:loved?|liked?|enjoyed?|share(?:d)?(?: a love of)?|bonded? over)\s/i.test(item)) {
          const topic = item.replace(/^(?:both\s+)?(?:loved?|liked?|enjoyed?|share(?:d)?(?: a love of)?|bonded? over)\s/i, '');
          return tone === 'chaotic' ? `I loved that we both bonded over ${topic}`
               : tone === 'warm'   ? `I loved our conversation about ${topic}`
               :                     `I appreciated our shared interest in ${topic}`;
        }
        // "interested (in/to) learn/know/hear more about X experience"
        if (/^(?:interested\s+(?:in|to)|curious\s+about|want\s+to|eager\s+to|hoping\s+to)\s+(?:learn|know|hear|understand)/i.test(item)) {
          const topic = item
            .replace(/^(?:interested\s+(?:in|to)|curious\s+about|want\s+to|eager\s+to|hoping\s+to)\s+(?:learn|know|hear|understand)(?:\s+more)?(?:\s+about)?(?:\s+your)?(?:\s+experience(?:\s+(?:in|with))?|(?:\s+background))?\s*/i, '')
            .replace(/\s+experience\s*$/i, '').replace(/\s+background\s*$/i, '').trim() || item;
          return tone === 'chaotic' ? `also dying to hear about your ${topic} experience`
               : tone === 'warm'   ? `I'm also really curious to learn more about your experience in ${topic}`
               :                     `I'm particularly interested in learning more about your background in ${topic}`;
        }
        // "interested in X" / "curious about X"
        if (/^(?:interested\s+in|curious\s+about|fascinated\s+by) /i.test(item)) {
          const topic = item.replace(/^(?:interested\s+in|curious\s+about|fascinated\s+by) /i, '');
          return tone === 'chaotic' ? `also super interested in ${topic}`
               : tone === 'warm'   ? `I'm also really curious about ${topic}`
               :                     `I'm particularly interested in ${topic}`;
        }
        // fallback
        return cap(item);
      };

      const parts = items.map(process);
      if (parts.length === 1) return cap(parts[0]) + '.';
      const [first, ...rest] = parts;
      const sep  = tone === 'professional' ? '. ' : '! ';
      const tail = rest.length === 1
        ? cap(rest[0])
        : rest.slice(0, -1).map(cap).join(', ') + ', and ' + rest[rest.length - 1];
      return cap(first) + sep + cap(tail) + '.';
    }

    // ==================== DRAFT SAVING ====================

    function formatRelativeTime(isoString) {
      if (!isoString) return '';
      const diff = Math.floor((Date.now() - new Date(isoString).getTime()) / 1000);
      if (diff < 60)   return 'just now';
      if (diff < 3600) return `${Math.floor(diff / 60)}m ago`;
      if (diff < 86400) return `${Math.floor(diff / 3600)}h ago`;
      return formatDate(isoString);
    }

    function saveManualDraft() {
      const body = document.getElementById('draft-output')?.value.trim();
      if (!body) { showToast('Nothing to save — generate a draft first.', 'warning'); return; }
      const type  = document.querySelector('.draft-type-btn.btn-primary')?.dataset.type || 'request';
      const rName = document.getElementById('r-name')?.value.trim() || '';
      const now   = new Date().toISOString();
      const record = {
        id:         genId(),
        templateId: type,
        contactName: rName,
        body,
        createdAt:  now,
        updatedAt:  now,
      };
      appData.saveDraft(record);
      renderSavedDraftsList();
      showToast('Draft saved.', 'success');
    }

    function openSavedDraft(id) {
      const draft = appData.getDrafts().find(d => d.id === id);
      if (!draft) return;
      const ta = document.getElementById('draft-output');
      if (!ta) return;
      ta.value = draft.body;
      // Sync autosave state so the restored draft is also the autosaved state
      appData.setDraftState({ body: draft.body, contextKey: `${draft.templateId}:${draft.contactName || ''}`, savedAt: new Date().toISOString() });
      const status = document.getElementById('draft-autosave-status');
      if (status) status.textContent = 'Saved';
      ta.focus();
      // Fire input event so autosave timer picks it up
      ta.dispatchEvent(new Event('input'));
    }

    function confirmDeleteSavedDraft(id) {
      const draft = appData.getDrafts().find(d => d.id === id);
      if (!draft) return;
      const preview = draft.body.slice(0, 60).replace(/\n/g, ' ');
      if (!confirm(`Delete this draft?\n\n"${preview}…"\n\nThis cannot be undone.`)) return;
      appData.deleteDraft(id);
      renderSavedDraftsList();
      showToast('Draft deleted.', 'success');
    }

    function renderSavedDraftsList() {
      const container = document.getElementById('saved-drafts-section');
      if (!container) return;
      const drafts = appData.getDrafts();
      if (!drafts.length) {
        container.innerHTML = '';
        return;
      }
      const typeLabels = { request: 'Request', thankyou: 'Thank-you', followup: 'Follow-up' };
      const items = drafts.map(d => {
        const preview  = d.body.replace(/\n+/g, ' ').slice(0, 72);
        const label    = typeLabels[d.templateId] || d.templateId || '';

        metaParts.push(label);
        metaParts.push(formatRelativeTime(d.updatedAt || d.createdAt));
        return `
          <div class="draft-saved-item">

    // ==================== CSV EXPORT ====================

    // Safely escape a single CSV cell value: wrap in quotes if it contains
    // commas, quotes, or newlines; double any internal double-quotes.
    function csvEscape(val) {
      const str = val == null ? '' : String(val);
      if (str.includes('"') || str.includes(',') || str.includes('\n') || str.includes('\r')) {
        return '"' + str.replace(/"/g, '""') + '"';
      }
      return str;
    }

    function triggerCSVDownload(filename, rows) {
      const csvContent = rows.map(row => row.map(csvEscape).join(',')).join('\r\n');
      const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
      const url  = URL.createObjectURL(blob);
      const a    = document.createElement('a');
      a.href = url; a.download = filename; a.style.display = 'none';
      document.body.appendChild(a);
      a.click();
      setTimeout(() => { document.body.removeChild(a); URL.revokeObjectURL(url); }, 100);
    }

    function handleRoute() {
      // Auth guard — block all routes until the user is authenticated
      if (!isAuthenticated()) {
        if (!document.getElementById('onboarding')) showAuthGate();
        return;
      }

      // Reveal app shell on first authenticated render
      const appShell = document.getElementById('app-container');
      if (appShell) appShell.style.visibility = '';

      // Show reset-demo button only for the designated demo account
      const resetBtn = document.getElementById('btn-reset-demo');
      if (resetBtn) {
        const user = getAuthUser();
        resetBtn.style.display = (user && user.email === DEMO_USER_EMAIL) ? '' : 'none';
      }

      const route = location.hash.slice(1).split('?')[0] || 'dashboard';
      const navItems = document.querySelectorAll('.nav-item');
      navItems.forEach(item => {
        if (item.dataset.route === route) {
          item.classList.add('active');
        } else {
          item.classList.remove('active');
        }
      });

      switch (route) {
        case 'dashboard':
          renderDashboard();
          break;
        case 'contacts':
          renderContacts();
          break;
        case 'new-chat':
          renderNewChat();
          break;
        case 'debrief':
          renderDebrief();
          break;
        case 'availability':
          renderAvailability();
          break;
        case 'drafts':
          renderDrafts();
          break;
        case 'profile':
          renderProfilePage();
          break;
        default:
          renderDashboard();
      }
    }

    async function saveProfileChanges() {
      const name       = document.getElementById('prof-name')?.value.trim() || '';
      const university = document.getElementById('prof-university')?.value.trim() || '';
      const study      = document.getElementById('prof-study')?.value.trim() || '';
      const linkedinUrl= document.getElementById('prof-linkedin')?.value.trim() || '';
      const newEmail   = (document.getElementById('prof-email')?.value || '').trim().toLowerCase();
      const newPassword= document.getElementById('prof-password')?.value || '';

        if (study.length > 40) {
          if (studyErrEl) { studyErrEl.textContent = 'Max 40 characters.'; studyErrEl.style.display = ''; }
          return;
        }
        if (!/^[A-Za-z0-9 &\/\-\.]+$/.test(study)) {
          if (studyErrEl) { studyErrEl.textContent = 'Only letters, numbers, spaces, &, /, -, and . are allowed.'; studyErrEl.style.display = ''; }
          return;
        }
      }
      if (studyErrEl) studyErrEl.style.display = 'none';

      // Validate required fields
      if (!name) { showToast('Please enter your name.', 'warning'); return; }
      if (!newEmail || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(newEmail)) {
        showToast('Please enter a valid email address.', 'warning'); return;
      }
      if (linkedinUrl && !/^https?:\/\/.+\..+/.test(linkedinUrl)) {
        showToast('LinkedIn URL should start with https://', 'warning'); return;
      }

      const auth    = loadAuthData();
      const authUser = getAuthUser();
      if (!authUser) { showToast('Session error — please log in again.', 'error'); return; }

      // Check email uniqueness if it changed
      if (newEmail !== authUser.email) {
        const conflict = auth.users.find(u => u.id !== authUser.id && u.email === newEmail);
        if (conflict) { showToast('That email is already in use by another account.', 'error'); return; }
      }

      // Update auth record
      const userRecord = auth.users.find(u => u.id === authUser.id);
      if (!userRecord) { showToast('Account not found.', 'error'); return; }
      userRecord.email = newEmail;

      if (newPassword) {
        userRecord.passwordHash = await hashPassword(newPassword);
      }
      saveAuthData();

      // Update per-user profile (preserving extra fields like major/year)
      const existing = appData.getProfile() || {};
      appData.saveProfile({
        ...existing,
        name,
        school: university,
        study,
        linkedinUrl,
      });

      showToast('Profile updated.', 'success');
      renderProfilePage(); // re-render with fresh values
    }

    // ==================== ONBOARDING / AUTH GATE ====================

    let _authMode = 'login'; // 'login' | 'create'

    // ---- Step 1: Auth gate (login / create account) ----

    function showAuthGate() {
      const existing = document.getElementById('onboarding');
      if (existing) existing.remove();
      _authMode = 'login';
      const inputStyle = 'width:100%;padding:0.625rem 0.875rem;border:1.5px solid var(--border);border-radius:var(--radius-sm);font-size:0.9rem;background:var(--surface);color:var(--text);';
      const html = `
        <div class="onboarding-overlay" id="onboarding">
          <div class="onboarding-card">
            <div class="onboarding-logo">chai.RM</div>
            <h1 class="onboarding-headline">Welcome.</h1>
            <p class="onboarding-sub" style="margin-bottom:1.25rem;">Sign in or create an account to get started.</p>
            <div class="auth-tabs">
              <button class="auth-tab active" id="tab-login"  onclick="switchAuthTab('login')">Log in</button>
              <button class="auth-tab"        id="tab-create" onclick="switchAuthTab('create')">Create account</button>
            </div>
            <div class="form-group" style="margin-bottom:0.75rem;">
              <label for="auth-email" class="auth-field-label">Email</label>
              <input type="email" id="auth-email" placeholder="you@example.com"
                autocomplete="email" style="${inputStyle}"
                onkeydown="if(event.key==='Enter')authSubmit()">
            </div>
            <div class="form-group" style="margin-bottom:0.875rem;">
              <label for="auth-password" class="auth-field-label">Password</label>
              <input type="password" id="auth-password" placeholder="••••••••"
                autocomplete="current-password" style="${inputStyle}"
                onkeydown="if(event.key==='Enter')authSubmit()">
            </div>
            <label class="auth-remember">
              <input type="checkbox" id="auth-remember" checked> Stay logged in
            </label>
            <button class="btn btn-primary" id="btn-auth-submit"
              style="width:100%;margin-top:0;justify-content:center;" onclick="authSubmit()">
              Log in →
            </button>
          </div>
        </div>`;
      document.body.insertAdjacentHTML('beforeend', html);
      // Focus email field
      requestAnimationFrame(() => {
        const el = document.getElementById('auth-email');
        if (el) el.focus();
      });
    }

    function switchAuthTab(mode) {
      _authMode = mode;
      document.getElementById('tab-login').classList.toggle('active',  mode === 'login');
      document.getElementById('tab-create').classList.toggle('active', mode === 'create');
      const btn = document.getElementById('btn-auth-submit');
      if (btn) btn.textContent = mode === 'login' ? 'Log in →' : 'Create account →';
      const pw = document.getElementById('auth-password');
      if (pw) pw.autocomplete = mode === 'login' ? 'current-password' : 'new-password';
    }

    async function authSubmit() {
      const emailRaw = (document.getElementById('auth-email')?.value   || '');
      const password  =  document.getElementById('auth-password')?.value || '';
      const remember  =  document.getElementById('auth-remember')?.checked ?? true;
      const email     = normalizeEmail(emailRaw);

      if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
        showToast('Please enter a valid email address.', 'warning'); return;
      }
      if (!password) {
        showToast('Please enter a password.', 'warning'); return;
      }

      const btn = document.getElementById('btn-auth-submit');
      if (btn) { btn.disabled = true; btn.textContent = '…'; }

      try {
        const hash = await hashPassword(password);
        const auth = loadAuthData();

        if (_authMode === 'login') {
          const user = auth.users.find(u => u.email === email);
          if (!user) { showToast('No account found with that email.', 'error'); return; }
          if (user.passwordHash !== hash) { showToast('Incorrect password.', 'error'); return; }
          setAuthSession(user.id, remember);
          showToast('Welcome back!', 'success');
          afterAuthSuccess(false); // existing account — skip onboarding

        } else {
          if (auth.users.find(u => u.email === email)) {
            showToast('An account with that email already exists.', 'error'); return;
          }
          const newUser = { id: genId(), email, passwordHash: hash, createdAt: new Date().toISOString() };
          auth.users.push(newUser);
          saveAuthData();
          setAuthSession(newUser.id, remember);
          showToast('Account created! Welcome.', 'success');
          afterAuthSuccess(true); // brand-new account — show onboarding
        }
      } finally {
        if (btn) {
          btn.disabled  = false;
          btn.textContent = _authMode === 'login' ? 'Log in →' : 'Create account →';
        }
      }
    }

    function afterAuthSuccess(isNewAccount = false) {
      const user = getAuthUser();
      bootWithUser(user.id); // mount the correct per-user dataset
      // Only prompt onboarding for brand-new accounts that haven't set up a profile yet
      const profile = appData.getProfile();
      if (isNewAccount && (!profile || (!profile.name && !profile.skipped))) {
        showProfileSetup();
      } else {
        document.getElementById('onboarding').remove();
        location.hash = '#/dashboard';
        handleRoute();
      }
    }

    // ---- Step 2: Profile setup (swaps card content after auth) ----

    function showProfileSetup() {
      // If overlay doesn't exist yet (e.g. restoring session on load), create it
      if (!document.getElementById('onboarding')) {
        const shell = document.createElement('div');
        shell.className = 'onboarding-overlay';
        shell.id = 'onboarding';
        shell.innerHTML = '<div class="onboarding-card"></div>';
        document.body.appendChild(shell);
      }
      const card = document.querySelector('#onboarding .onboarding-card');
      if (!card) return;
      const inputStyle = 'width:100%;padding:0.625rem 0.875rem;border:1.5px solid var(--border);border-radius:var(--radius-sm);font-size:0.9rem;background:var(--surface);color:var(--text);';
      card.innerHTML = `
        <button class="onboarding-skip" onclick="showAuthGate()" style="display:block;text-align:left;margin-bottom:1.25rem;padding:0;">← Back</button>
        <div class="onboarding-logo">chai.RM</div>
        <h1 class="onboarding-headline">One more thing.</h1>
        <p class="onboarding-sub">Let's fill in a few details so your messages feel personal from the start.</p>
        <div class="form-group">
          <label for="ob-name">Your name <span style="color:var(--danger)">*</span></label>
          <input type="text" id="ob-name" placeholder="First Last" style="${inputStyle}">
        </div>
        <div class="form-group">
          <label for="ob-linkedin">LinkedIn URL <span style="font-weight:400;color:var(--text-muted)">(optional)</span></label>
          <input type="url" id="ob-linkedin" placeholder="https://linkedin.com/in/your-name" style="${inputStyle}">
        </div>
        <div class="onboarding-grid">
          <div class="form-group">
            <label for="ob-school">School</label>
            <input type="text" id="ob-school" placeholder="e.g. Emory University" style="${inputStyle}">
          </div>
          <div class="form-group">
            <label for="ob-major">Major</label>
            <input type="text" id="ob-major" placeholder="e.g. Finance" style="${inputStyle}">
          </div>
        </div>
        <div class="form-group">
          <label for="ob-year">Year</label>
          <select id="ob-year" style="${inputStyle}">
            <option value="">Select your year...</option>
            <option>Freshman</option>
            <option>Sophomore</option>
            <option>Junior</option>
            <option>Senior</option>
            <option>Graduate student</option>
            <option>Alumni</option>
          </select>
        </div>
        <button class="btn btn-primary" style="width:100%;margin-top:0.25rem;justify-content:center;" onclick="saveOnboarding()">Let's go →</button>
        <button class="onboarding-skip" onclick="skipOnboarding()">Skip for now</button>
      `;
    }

    function saveOnboarding() {
      const name = document.getElementById('ob-name').value.trim();
      if (!name) { showToast('Please enter your name to continue.', 'warning'); return; }
      appData.saveProfile({
        name,
        school:      document.getElementById('ob-school').value.trim(),
        major:       document.getElementById('ob-major').value.trim(),
        year:        document.getElementById('ob-year').value,
        linkedinUrl: document.getElementById('ob-linkedin').value.trim(),
      });
      document.getElementById('onboarding').remove();
      location.hash = '#/dashboard';
      handleRoute();
    }

    function skipOnboarding() {
      appData.saveProfile({ name: '', school: '', major: '', year: '', linkedinUrl: '', skipped: true });
      document.getElementById('onboarding').remove();
      location.hash = '#/dashboard';
      handleRoute();
    }

    window.addEventListener('hashchange', handleRoute);
    document.addEventListener('DOMContentLoaded', () => {
      document.querySelectorAll('.nav-item[data-route]').forEach(item => {
        item.style.cursor = 'pointer';
        item.addEventListener('click', () => navigate(item.dataset.route));
      });
      updateThankYouBadge();

      // Restore auth session from storage
      const persistedId = localStorage.getItem(AUTH_PERSIST_KEY) || sessionStorage.getItem(AUTH_SESSION_KEY);
      const knownUsers  = loadAuthData().users;
      if (persistedId && knownUsers.find(u => u.id === persistedId)) {
        // Valid persisted session — restore user data
        loadAuthData().currentUserId = persistedId;
        saveAuthData();
        bootWithUser(persistedId);
        // Goal C/D: preserve an existing hash (user refreshed mid-session);
        // only default to dashboard when hash is absent or bare
        if (!location.hash || location.hash === '#' || location.hash === '#/') {
          location.hash = '#/dashboard';
        }
        handleRoute();
      } else {
        // No valid session — silently clear any stale protected hash, show login
        history.replaceState(null, '', location.pathname);
        showAuthGate();
      }
    });
  </script>
</body>
</html>
